<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .payment-card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary {
            margin-bottom: 20px;
        }

        .summary p {
            margin: 8px 0;
        }

        .total {
            font-weight: bold;
            font-size: 18px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .pay-btn:hover {
            background-color: #1b5e20;
        }

        .note {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="payment-card">

        <div class="title">Complete Payment</div>

        <div class="summary">
            <p><strong>Order ID:</strong> {{ order.id }}</p>
            <p class="total">Total: {{ order.total_price }} Birr</p>
        </div>

        <form method="POST" action="{% url 'process_payment' order.id %}">
            {% csrf_token %}

            <label>Select Payment Method:</label>
            <select name="method">
                <option value="telebirr">Telebirr</option>
                <option value="cbebirr">CBE Birr</option>
                <option value="cash">Cash</option>
            </select>

            <button type="submit" class="pay-btn">Pay Now</button>
        </form>

        <div class="note">
            This is a secure simulated payment
        </div>

    </div>
</div>

</body>
</html>
